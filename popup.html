<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>slither.io Bot Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      background: #111;
      color: #ddd;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #4af;
      margin-bottom: 14px;
      text-align: center;
    }
    .detected-box {
      background: #0d2818;
      border: 1px solid #1a4a2e;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 12px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .detected-box .label { color: #4a4; font-size: 11px; text-transform: uppercase; }
    .detected-box .server { color: #8f8; font-weight: 600; }
    .detected-box .badge { color: #4a4; font-size: 11px; }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .row label {
      min-width: 60px;
      color: #999;
      font-size: 13px;
    }
    input, select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      color: #ddd;
      font-size: 13px;
    }
    input:focus {
      outline: none;
      border-color: #4af;
    }
    input[type=range] {
      flex: none;
      width: 120px;
      background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: #333;
      border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4af;
      margin-top: -5px;
    }
    .group-val {
      min-width: 36px;
      text-align: center;
      font-weight: bold;
      color: #4af;
    }
    .sub {
      font-size: 11px;
      color: #666;
      text-align: center;
      flex: 1;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #4af; color: #000; }
    .btn-danger  { background: #e44; color: #fff; }
    .btn-secondary { background: #333; color: #ddd; }
    .btn-success { background: #284; color: #fff; }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn-row .btn { flex: 1; }
    hr { border: none; border-top: 1px solid #222; margin: 12px 0; }
    .manual-link {
      text-align: center;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .manual-link:hover { color: #4af; }
    .manual-fields { display: none; }
    .manual-fields.visible { display: block; }
    .status-box {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .status-box .label { color: #666; }
    .status-box .val { color: #4af; }
    .status-box .val.green { color: #4a4; }
    .status-box .val.red { color: #e44; }
    .error { color: #e44; font-size: 12px; margin-top: 6px; }
    .target-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .target-row input { width: 80px; flex: none; }
    .target-row button { flex: 1; }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex: none;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 22px;
      transition: 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: #284; }
    .switch input:checked + .slider::before { transform: translateX(18px); background: #fff; }
    .follow-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .follow-row .label { color: #999; font-size: 13px; }
    .follow-row .player-pos { color: #4af; font-size: 12px; flex: 1; text-align: right; }
  </style>
</head>
<body>
  <h1>🐍 Bot Control</h1>

  <div class="detected-box" id="detectedBox" style="display:none">
    <div>
      <div class="label">Playing on</div>
      <div class="server" id="detectedServer">—</div>
    </div>
    <div class="badge">auto-detected</div>
  </div>

  <div class="row">
    <label>Groups</label>
    <input type="range" id="groupsSlider" min="1" max="100" value="4">
    <span class="group-val" id="groupsVal">4</span>
    <span class="sub">× 4 bots</span>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnStart">▶ Start</button>
    <button class="btn btn-danger"  id="btnStop">■ Stop</button>
  </div>

  <hr>

  <div class="target-row row">
    <label>Target</label>
    <input id="targetX" value="30000">
    <input id="targetY" value="30000">
    <button class="btn btn-secondary" id="btnEdit" style="flex:0; padding:6px 12px">✏</button>
  </div>

  <div class="follow-row">
    <label class="switch">
      <input type="checkbox" id="followToggle">
      <span class="slider"></span>
    </label>
    <span class="label">Follow me</span>
    <span class="player-pos" id="playerPos">—</span>
  </div>

  <hr>

  <div class="manual-link" id="manualToggle">＋ Manual server config</div>
  <div class="manual-fields" id="manualFields">
    <div class="row">
      <label>Server</label>
      <input id="serverIp" placeholder="192.211.52.146">
    </div>
    <div class="row">
      <label>Port</label>
      <input id="serverPort" placeholder="444">
    </div>
    <div class="row">
      <label>Path</label>
      <input id="serverPath" placeholder="/slither" value="/slither">
    </div>
  </div>

  <hr>

  <div class="status-box">
    <div><span class="label">Status:</span> <span class="val" id="statusText">—</span></div>
    <div><span class="label">Bots:</span> <span id="botsText">0</span> running</div>
    <div><span class="label">Target:</span> (<span id="targetXDisplay">30000</span>, <span id="targetYDisplay">30000</span>)</div>
    <div><span class="label">Groups:</span> <span id="groupsDisplay">—</span></div>
    <div class="error" id="errorText"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
